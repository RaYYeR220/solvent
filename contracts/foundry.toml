[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# via_ir = true  # uncomment if a later contract hits "stack too deep" under the optimizer
ffi = false

[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"

[etherscan]
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api", chain = 5000 }
