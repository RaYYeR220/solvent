name: agent-tick
on:
  schedule:
    # Hourly cadence (24 ticks/day). Each tick costs ~0.023 MNT on Mantle
    # (attestObservation + ERC-8004 mirror write); hourly stays within ~$0.40/day
    # so 6 MNT lasts ~15 days. To pause entirely during dev: Actions tab →
    # agent-tick → "Disable workflow" (workflow_dispatch still works for ad-hoc
    # manual ticks). For demo day, can be bumped to `*/15 * * * *` short-term.
    - cron: "0 * * * *"
  workflow_dispatch: {}

concurrency:
  group: agent-tick
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install agent dependencies
        working-directory: agent
        run: npm ci

      - name: Run one tick
        id: tick
        working-directory: agent
        env:
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          VAULT_ADDRESS: ${{ vars.VAULT_ADDRESS }}
          AGENT_ID: ${{ vars.AGENT_ID }}
          ASSET_ADDRESS: ${{ vars.ASSET_ADDRESS }}
          SAFE_ASSET_ADDRESS: ${{ vars.SAFE_ASSET_ADDRESS }}
          POLL_INTERVAL_MS: "300000"
          WATCH_DIVERGENCE_BPS: "20"
          EARLY_DIVERGENCE_BPS: "50"
          TERMINAL_DIVERGENCE_BPS: "500"
          MAX_ORACLE_DIVERGENCE_BPS: "100"
          LIQUIDITY_FLOOR: "0"
          MAX_SLIPPAGE_BPS: "300"
          MAX_BRIDGE_LTV_BPS: "5000"
          ASSET_DECIMALS: "6"
          SAFE_DECIMALS: "6"
          # Must match SolventVaultV2's on-chain `policy.allowedActions`.
          # V2 default = SWAP_TO_SAFE bit only (2). Any other action chosen by
          # the agent → on-chain revert and a crashed tick. Full bitmap ref:
          # PARK_YIELD (16) | UNWIND_BRIDGE (8) | BRIDGE_VIA_LENDING (4) | SWAP_TO_SAFE (2).
          ALLOWED_ACTIONS: "2"
        shell: bash
        run: |
          set -eo pipefail
          npm run tick 2>&1 | tee tick.log

      - name: Upload tick log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tick-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: agent/tick.log
          retention-days: 14
